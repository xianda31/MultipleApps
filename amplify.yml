version: 1

backend:
  phases:
    preBuild:
      commands:
        - npm cache clean --force
    build:
      commands:
        - npm ci --prefer-offline --no-audit
    postBuild:
      commands:
        - echo "Build complete"

frontend:
  phases:
    preBuild:
      commands:
        - echo "Installing frontend dependencies..."
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist/admin/browser
    files:
      - '**/*'
  cache:
    paths:
      - 'node_modules/**/*'
      - '.angular/**/*'
