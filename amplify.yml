version: 1
backend:
  phases:
    preBuild:
      commands:
        - rm -rf .npm
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - rm -rf .npm
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist/admin/browser
    files:
      - '**/*'
  cache:
    paths:
      - '.npm/**/*'
