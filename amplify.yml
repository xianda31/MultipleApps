version: 1
backend:
  phases:
    build:
      commands:
        - |
          if [ -d node_modules ]; then
            echo "node_modules restored from cache, skipping full install"
            npm install --prefer-offline --no-audit --no-fund 2>/dev/null || npm ci
          else
            npm ci
          fi
        - npm install @parcel/watcher-linux-x64-glibc@2.5.1 --no-save
        - |
          SCHEMA1="node_modules/@aws-amplify/deployed-backend-client/node_modules/@aws-amplify/backend-output-schemas/lib/platform/stack_metadata_schemas.js"
          SCHEMA2="node_modules/@aws-amplify/backend-cli/node_modules/@aws-amplify/backend-output-schemas/lib/platform/stack_metadata_schemas.js"
          for f in "$SCHEMA1" "$SCHEMA2"; do
            [ -f "$f" ] && sed -i 's/z\.record(exports\.backendOutputEntryStackMetadataSchema)/z.record(zod_1.z.string(), exports.backendOutputEntryStackMetadataSchema)/g' "$f" || true
          done
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist/admin/browser
    files:
      - '**/*'
  cache:
    paths:
      - 'node_modules/**/*'
      - '.angular/cache/**/*'
