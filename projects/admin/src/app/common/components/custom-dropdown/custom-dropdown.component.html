<div class="custom-dropdown-container position-relative w-100">
  <input type="text"
    class="dropdown-input"
    [(ngModel)]="searchValue"
    (ngModelChange)="onInputChange($any($event))"
    (focus)="onFocus()"
    (blur)="hideSuggestionsDelay()"
    [class.is-invalid-input]="invalid"
    [placeholder]="placeholder"
    autocomplete="off">

  <div *ngIf="invalid && invalidMessage" class="invalid-feedback-msg">{{ invalidMessage }}</div>

  <ul *ngIf="showSuggestions && getFilteredItems().length > 0"
    class="dropdown-list position-absolute start-0 end-0 mt-1 list-unstyled border rounded shadow-sm"
    style="z-index: 1000; max-height: 300px; overflow-y: auto; background: white;">
    <li *ngFor="let item of getFilteredItems()"
      (click)="selectItem(item)"
      class="p-2 cursor-pointer hover-highlight">
      {{ displayFn(item) }}
    </li>
  </ul>
</div>
