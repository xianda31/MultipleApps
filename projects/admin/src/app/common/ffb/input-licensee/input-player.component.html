<app-custom-dropdown
  [items]="players"
  [placeholder]="placeholder"
  [searchValue]="str_player"
  [displayFn]="displayPlayerFn"
  [invalid]="showInvalidSelection"
  invalidMessage="Veuillez sélectionner un joueur dans la liste"
  (searchValueChange)="onSearchChange($event)"
  (blurred)="onInputBlur()"
  (itemSelected)="onPlayerSelected($event)">
</app-custom-dropdown>
