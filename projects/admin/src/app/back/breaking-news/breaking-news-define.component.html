<div class="container-fluid p-4">
  <div class="row mb-4">
    <div class="col-12">
      <h4>Gestion des Breaking News</h4>
      <p class="text-muted">Gérez les messages d'information qui s'affichent en haut de l'administration</p>
    </div>
  </div>

  <!-- Authorization Flag Control -->
  <div class="row mb-4">
    <div class="col-12">
      <!-- <div class="card border-info">
        <div class="card-body"> -->
      <div class="d-flex align-items-center justify-content-start gap-3">
        <h6> Autorisation d'affichage du bandeau </h6>
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="authorizationToggle"
            [checked]="(authorizationFlag$ | async)" (change)="toggleAuthorizationFlag()" />
          <label class="form-check-label" for="authorizationToggle">
            {{ (authorizationFlag$ | async) ? 'Autorisé' : 'Désactivé' }}
          </label>
        </div>
        <!-- </div>
        </div> -->
      </div>
    </div>
  </div>

  <!-- Form to add new message -->
  <div class="row mb-4">
    <h6> Ajouter un nouveau message </h6>

    <div class="position-relative">
      <div class="input-group mb-2">
        <button type="button" class="btn btn-secondary btn-sm" (click)="toggleEmojiPicker()" title="Insérer un emoji">
          😀 Emojis
        </button>
        <input type="text" class="form-control"
          placeholder="Entrez le message (ex: 📅 Prochain tournoi : inscriptions ouvertes)" [(ngModel)]="newMessageText"
          (keyup.enter)="addMessage()" [disabled]="saving" />
        <button class="btn btn-primary" type="button" (click)="addMessage()"
          [disabled]="saving || !newMessageText.trim()">
          <span *ngIf="!saving">➕ Ajouter</span>
          <span *ngIf="saving" class="spinner-border spinner-border-sm me-2"></span>
          <span *ngIf="saving">En cours...</span>
        </button>
      </div>

      <!-- Emoji Gallery -->
      <div *ngIf="showEmojiPicker" class="emoji-picker card shadow-sm position-absolute" style="z-index: 10;">
        <div class="p-2">
          <div class="emoji-grid">
            <button *ngFor="let emojiItem of emojis" type="button" class="emoji-btn"
              (click)="insertEmoji(emojiItem.emoji)" [title]="emojiItem.label">
              {{ emojiItem.emoji }}
            </button>
          </div>
        </div>
      </div>
    </div>
    
  </div>

  <!-- Messages list -->
  <div class="row">
    <div class="col-12">
      <!-- <div class="card">
        <div class="card-header"> -->
      <h6 class="mb-0">
        Messages définis
        <span class="badge bg-info ms-2">{{ messages.length }}</span>
      </h6>
      <!-- </div> -->
      <div class="card-body">
        <div *ngIf="messages.length === 0" class="alert alert-info">
          Aucun message défini. Créez votre premier breaking news ci-dessus.
        </div>

        <div *ngFor="let message of messages" class="message-item mb-3 p-3 border rounded">
          <div class="d-flex justify-content-between align-items-start">
            <div class="flex-grow-1">
              <!-- Display mode -->
              <div *ngIf="editingId !== message.id" class="message-content">
                <div class="d-flex align-items-center gap-2 mb-2">
                  <input type="checkbox" class="form-check-input" [checked]="message.active"
                    (change)="toggleActive(message.id)" [disabled]="saving" />
                  <span [class.text-muted]="!message.active" [class.text-strike]="!message.active">
                    {{ message.text }}
                  </span>
                </div>
              </div>

              <!-- Edit mode -->
              <div *ngIf="editingId === message.id" class="edit-mode">
                <input type="text" class="form-control mb-2" [(ngModel)]="editingText" [disabled]="saving" />
                <div class="d-flex gap-2 mb-2">
                  <button type="button" class="btn btn-success btn-sm" (click)="saveEdit()"
                    [disabled]="saving || !editingText.trim()">
                    ✓ Valider
                  </button>
                  <button type="button" class="btn btn-secondary btn-sm" (click)="cancelEdit()" [disabled]="saving">
                    ✗ Annuler
                  </button>
                  <div class="position-relative">
                    <button type="button" class="btn btn-outline-secondary btn-sm"
                      (click)="showEditEmojiPicker = !showEditEmojiPicker" title="Insérer un emoji">
                      😀
                    </button>
                    <div *ngIf="showEditEmojiPicker" class="emoji-picker-small card shadow-sm">
                      <div class="card-body p-2">
                        <div class="emoji-grid">
                          <button *ngFor="let emojiItem of emojis" type="button" class="emoji-btn"
                            (click)="insertEmojiInEdit(emojiItem.emoji); showEditEmojiPicker = false"
                            [title]="emojiItem.label">
                            {{ emojiItem.emoji }}
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Action buttons -->
            <div class="btn-group ms-2" role="group" *ngIf="editingId !== message.id">
              <button type="button" class="btn btn-sm btn-outline-primary" (click)="startEdit(message)"
                [disabled]="saving" title="Éditer">
                ✏️
              </button>
              <button type="button" class="btn btn-sm btn-outline-danger" (click)="deleteMessage(message.id)"
                [disabled]="saving" title="Supprimer">
                🗑️
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- </div>F -->
  </div>
</div>
