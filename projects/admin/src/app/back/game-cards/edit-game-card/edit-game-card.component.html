<div class="modal-header pb-0 ">
    <div class="col justify-content-between">
        <div class="row align-items-center">
            <h5 class="col-10 modal-title">
                Carte de  {{card.initial_qty}} tournois
            </h5>
            <span class="col-2 text-center">
                <button (click)="close()" type="button" class="btn btn-sm btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </span>
        </div>
        <div class="text-muted">
            <span class="fw-bolder">titulaire(s) :</span>
            <div class="d-flex flex-column gap-2 mt-1">
                <div class="d-flex flex-wrap gap-1 align-items-center">
                    <ng-container *ngFor="let owner of card.owners">
                        <span class="badge text-bg-light border">
                            {{owner.lastname}} {{owner.firstname}}
                        </span>
                        <button
                            *ngIf="canRemoveOwner()"
                            class="btn btn-sm btn-outline-danger py-0 px-1"
                            type="button"
                            (click)="removeOwner(owner.license_number)">
                            <i class="bi bi-x"></i>
                        </button>
                    </ng-container>
                </div>

                <div class="input-group input-group-sm" *ngIf="card.owners.length < 2">
                    <select
                        class="form-select"
                        [value]="selectedOwnerLicense"
                        (change)="selectedOwnerLicense = $any($event.target).value">
                        <option value="">Ajouter un titulaire...</option>
                        <option *ngFor="let member of ownerCandidates()" [value]="member.license_number">
                            {{member.lastname}} {{member.firstname}}
                        </option>
                    </select>
                    <button
                        class="btn btn-outline-primary"
                        type="button"
                        [disabled]="!selectedOwnerLicense"
                        (click)="addOwner()">
                        Ajouter
                    </button>
                </div>
            </div>
        </div>
        <div class="row justify-content-between  align-items-center mb-2">
            <div class="col-6 text-muted">
                <span class="fw-bolder me-1">créée le :</span>
                <span>{{ card.createdAt | date:'dd/MM/yyyy' }}</span>
            </div>
            <div class="col-6 text-muted text-center">
                <span class="fw-bolder me-1">crédit restant :</span>
                <span class="badge bg-success">{{free_places_nbr}}</span>
            </div>
        </div>
        <div *ngIf="card.manual_creation" class="text-muted mb-2">
            <span><i class="bi bi-tags-fill"></i> &nbsp;</span>
            <span>{{ card.comment }}</span>
        </div>
    </div>
</div>

<div class="modal-body">
    <div class="row row-cols-2 row-cols-md-4 g-0">
        <div *ngFor="let place of stamp_places ; let i = index" class="col">
            <div [class]=" place.free ? 'card h-100' :'card h-100 bg-light'" (click)="stamp(i)">
                <div class="card-body text-center">
                    <small [class]=" place.free ? 'text-muted' :'  fw-bolder'"> {{place.stamp}}</small>
                </div>
            </div>
        </div>
    </div>

    
</div>

<!-- </ng-container> -->

<div class="modal-footer">
    <div class="justify-content-between">
        <button type="button" class="btn btn-primary btn-sm" (click)="got_it()">valider</button>
    </div>
</div>
