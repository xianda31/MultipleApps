<div class="mt-3 col-12 offset-md-3 col-md-6">
    <div class="card">
        <div class="card-body">
            <h4 class="card-title">Recettes, dépenses et résultat par mois</h4>
            <div class="card-text text-center justify-content-center">
                <div class="w-75 mx-auto">
                    <canvas baseChart
                        [data]="financialChartData"
                        [options]="financialChartOptions"
                        [type]="'bar'">
                    </canvas>
                </div>
                <!-- Légende personnalisée -->
                <div class="d-inline-flex  border border-dark rounded p-2 mt-3 mx-auto">
                    <span class="legend-item">
                        <span class="legend-symbol" style="background-color: rgba(34, 129, 16, 0.6);"></span>
                        Recettes
                    </span>
                    <span class="legend-item ms-4">
                        <span class="legend-symbol" style="background-color: rgba(108, 117, 125, 0.6);"></span>
                        Dépenses
                    </span>
                    <span class="legend-item ms-4">
                        <svg class="legend-point" width="12" height="12"
                            style="margin-right: 8px; vertical-align: middle;">
                            <circle cx="6" cy="6" r="5" fill="rgb(13, 95, 189)" stroke="#fff" stroke-width="2" />
                        </svg>
                        Résultat
                    </span>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Card Joueurs par mois -->
<div class="mt-3 col-12 offset-md-3 col-md-6">
    <div class="card">
        <div class="card-header">
            <!-- <h4 class="card-title"> -->
                Joueurs et tournois
                (moyenne mensuelle : {{playerCountAverage}} joueurs sur {{tournamentCountAverage}} tournois ) 
            <!-- </h4> -->
        </div>

        <div class="card-body">
            <div class="card-text text-center justify-content-center">
                <div class="w-75 mx-auto">
                    <canvas baseChart
                        [data]="playerChartData"
                        [options]="playerChartOptions"
                        [type]="'bar'">
                    </canvas>
                </div>
                <div class="d-inline-flex border border-dark rounded p-2 mt-3 mx-auto flex-wrap justify-content-center">
                    <span class="legend-item">
                        <span class="legend-symbol" [style.backgroundColor]="playerChartData.datasets[0]?.backgroundColor"></span>
                        Joueurs
                    </span>
                    <span class="legend-item ms-4">
                        <svg class="legend-point" width="12" height="12"
                            style="margin-right: 8px; vertical-align: middle;">
                            <circle cx="6" cy="6" r="5" fill="rgb(13, 95, 189)" stroke="#fff" stroke-width="2" />
                        </svg>
                        Tournois
                    </span>
                    <span class="legend-item ms-4">
                        <svg class="legend-line" width="20" height="12"
                            style="margin-right: 8px; vertical-align: middle;">
                            <line x1="0" y1="6" x2="20" y2="6" stroke="currentColor" stroke-width="1" stroke-dasharray="5,5" style="color: rgba(34, 129, 16, 1);" />
                        </svg>
                        Moy. Joueurs
                        <!-- Moy. Joueurs : {{ playerCountAverage.toFixed(0) }} -->
                    </span>
                    <span class="legend-item ms-4">
                        <svg class="legend-line" width="20" height="12"
                            style="margin-right: 8px; vertical-align: middle;">
                            <line x1="0" y1="6" x2="20" y2="6" stroke="currentColor" stroke-width="1" stroke-dasharray="5,5" style="color: rgb(13, 95, 189);" />
                        </svg>
                        Moy. Tournois
                        <!-- Moy. Tournois : {{ tournamentCountAverage.toFixed(1) }} -->
                    </span>
                </div>
            </div>
        </div>
    </div>
</div>
