<div class="mt-3 col-12 offset-md-3 col-md-6">
    <div class="card">
        <div class="card-body">
            <h4 class="card-title">Recettes, dépenses et résultat par mois</h4>
            <div class="card-text text-center justify-content-center">

                <div class="chart-wrapper">
                    <canvas baseChart [data]="barChartData" [options]="barChartOptions" [type]="'bar'">
                    </canvas>
                </div>
                <!-- Légende personnalisée -->
                <div class="d-inline-flex  border border-dark rounded p-2 mt-3 mx-auto">
                    <span class="legend-item">
                        <span class="legend-symbol" style="background-color: rgba(34, 129, 16, 0.6);"></span>
                        Recettes
                    </span>
                    <span class="legend-item ms-4">
                        <span class="legend-symbol" style="background-color: rgba(108, 117, 125, 0.6);"></span>
                        Dépenses
                    </span>
                    <span class="legend-item ms-4">
                        <svg class="legend-point" width="12" height="12"
                            style="margin-right: 8px; vertical-align: middle;">
                            <circle cx="6" cy="6" r="5" fill="rgb(13, 95, 189)" stroke="#fff" stroke-width="2" />
                        </svg>
                        Résultat
                    </span>
                </div>
            </div>
        </div>
    </div>
</div>
