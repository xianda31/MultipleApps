<!-- Mode laptop : barre de navigation complète -->
<div *ngIf="!isMobile" class="row d-md-flex h-auto g-0 w-100 py-0 my-0 laptop-navbar-row">
  <nav class="navbar navbar-dark navbar-expand d-flex w-100 justify-content-center position-relative">
    <!-- Logo du club positionné indépendamment (remplace le nom) -->
    <div class="club-name-sticky-independent d-none">
      <a routerLink="contacts" class="nav-link" style="display:flex; align-items:center;">
        <img [src]="logoUrl || imageClubUrl || ''" alt="logo" class="img-fluid" style="max-height:40px; width:auto;" />
      </a>
    </div>
    
    <div class="d-flex flex-row align-items-center justify-content-center gap-5 w-auto mx-auto"
      style="font-size: 1.3rem; font-weight: bold;">
      <div
        class="navbar-collapse navbar-desktop position-relative d-flex align-items-center navbar-menu-align justify-content-center p-0 m-0">
        <ul class="navbar-nav mb-0 flex-nowrap justify-content-center" style="gap: 1.5rem;">
          <li *ngIf="brandNavitem" class="nav-item ms-3">
            <a class="nav-link main-nav-link" [routerLink]="brandNavitem.path">
              {{ brandNavitem.label }}
            </a>
          </li>
          <ng-container *ngTemplateOutlet="dyn_navbar_unified; context: { isMobile: false }"></ng-container>
        </ul>
      </div>
    </div>
  </nav>
</div>

<!-- Mode mobile : liste simple pour l'offcanvas -->
<ul *ngIf="isMobile" class="navbar-nav mb-0 flex-nowrap">
  <ng-container *ngTemplateOutlet="dyn_navbar_unified; context: { isMobile: true }"></ng-container>
</ul>

<!-- Templates dynamiques pour menus -->
<ng-template #dyn_navbar_unified let-isMobile="isMobile">
  <ng-container *ngFor="let menu of navbar_menus; let last = last; trackBy: trackNavitemId">
    <ng-container
      *ngIf="menu.navitem.position === NAVITEM_POSITION.NAVBAR &&
            (menu.navitem.logging_criteria === NAVITEM_LOGGING_CRITERIA.ANY
            || (menu.navitem.logging_criteria === NAVITEM_LOGGING_CRITERIA.LOGGED_ONLY && (logged_member$ | async))
            || (menu.navitem.logging_criteria === NAVITEM_LOGGING_CRITERIA.UNLOGGED_ONLY && !(logged_member$ | async)))">
      <ng-container
        *ngTemplateOutlet="menuGroupRecursive; context: { $implicit: menu, isMobile: isMobile, isPortrait: isPortrait, isLastTop: last }"></ng-container>
    </ng-container>
  </ng-container>
</ng-template>

<ng-template #menuGroupRecursive let-menu let-isMobile="isMobile" let-isLastTop="isLastTop" let-dropdown="dropdown">
  <ng-container *ngIf="menu.navitem.type === NAVITEM_TYPE.DROPDOWN && (menu.childs?.length || 0)">
    <!-- Mode desktop (laptop) : dropdown classique -->
    <ng-container *ngIf="!isMobile; else landscapeDropdownList">
      <li class="nav-item dropdown ms-3" ngbDropdown #drop="ngbDropdown">
        <a class="nav-link main-nav-link dropdown-toggle" ngbDropdownToggle [id]="'nav-' + menu.navitem.id">
          <img *ngIf="menu.navitem.pre_label === 'avatar'" [src]="avatar$ | async" alt="avatar"
            class="rounded-circle"
            style="width:28px; height:28px; max-width:28px; max-height:28px; object-fit:cover">
          <span>{{ label_transformer(menu.navitem.label) | async }}</span>
        </a>
        <ul class="dropdown-menu" ngbDropdownMenu [attr.aria-labelledby]="'nav-' + menu.navitem.id">
          <ng-container *ngFor="let child of (menu.childs || []); trackBy: trackNavitemId">
            <ng-container
              *ngTemplateOutlet="menuGroupRecursive; context: { $implicit: child, isMobile: isMobile, dropdown: drop }"></ng-container>
          </ng-container>
        </ul>
      </li>
    </ng-container>
    <!-- Mode mobile/landscape : liste imbriquée -->
    <ng-template #landscapeDropdownList>
      <li class="nav-item mobile-submenu-parent ps-2">
        <span class="dropdown-item ps-0">
          <img *ngIf="menu.navitem.pre_label === 'avatar'" [src]="avatar$ | async" alt="avatar"
            class="rounded-circle"
            style="width:28px; height:28px; max-width:28px; max-height:28px; object-fit:cover">
          {{ label_transformer(menu.navitem.label) | async }}
        </span>
        <ul class="navbar-nav ms-3">
          <ng-container *ngFor="let child of (menu.childs || []); trackBy: trackNavitemId">
            <ng-container
              *ngTemplateOutlet="menuGroupRecursive; context: { $implicit: child, isMobile: isMobile }"></ng-container>
          </ng-container>
        </ul>
      </li>
    </ng-template>
  </ng-container>
  <ng-container *ngIf="menu.navitem.type !== NAVITEM_TYPE.DROPDOWN || !(menu.childs?.length || 0)">
    <li [ngClass]="isMobile ? 'nav-item ps-2' + (isLastTop ? ' mt-4' : '') : 'nav-item ms-3'">
      <a *ngIf="menu.navitem.type === NAVITEM_TYPE.EXTERNAL_REDIRECT"
        [ngClass]="isMobile ? 'dropdown-item ps-0' + (isLastTop ? ' fw-bold' : '') : 'nav-link main-nav-link'"
        [href]="menu.navitem.extra_parameter" target="_blank" rel="noopener"
        [attr.data-bs-dismiss]="isMobile ? 'offcanvas' : null"
        (click)="dropdown?.close()">
        <ng-container *ngTemplateOutlet="menuLabelTemplate; context: { $implicit: menu }"></ng-container>
      </a>
      <a *ngIf="menu.navitem.type === NAVITEM_TYPE.INTERNAL_LINK"
        [ngClass]="isMobile ? 'dropdown-item ps-0' + (isLastTop ? ' fw-bold' : '') : 'nav-link main-nav-link'"
        [routerLink]="menu.navitem.path" [attr.data-bs-dismiss]="isMobile ? 'offcanvas' : null"
        (click)="dropdown?.close()">
        <ng-container *ngTemplateOutlet="menuLabelTemplate; context: { $implicit: menu }"></ng-container>
      </a>
      <a *ngIf="menu.navitem.type?.toLowerCase() === 'plugin'"
        [ngClass]="isMobile ? 'dropdown-item Plugin ps-0' : 'nav-link main-nav-link Plugin'"
        [routerLink]="menu.navitem.path" [attr.data-bs-dismiss]="isMobile ? 'offcanvas' : null"
        (click)="dropdown?.close()">
        <ng-container *ngTemplateOutlet="menuLabelTemplate; context: { $implicit: menu }"></ng-container>
      </a>
      <a *ngIf="menu.navitem.type === NAVITEM_TYPE.CUSTOM_PAGE"
        [ngClass]="isMobile ? 'dropdown-item  ps-0' : 'nav-link main-nav-link '" [routerLink]="menu.navitem.path"
        [attr.data-bs-dismiss]="isMobile ? 'offcanvas' : null"
        (click)="dropdown?.close()">
        <ng-container *ngTemplateOutlet="menuLabelTemplate; context: { $implicit: menu }"></ng-container>
      </a>
      <a *ngIf="menu.navitem.type === NAVITEM_TYPE.DIRECT_CALL"
        [ngClass]="isMobile ? 'dropdown-item ps-0' : 'nav-link main-nav-link'"
        (click)="onCommand(menu.navitem); dropdown?.close()"
        [attr.data-bs-dismiss]="isMobile ? 'offcanvas' : null">
        <ng-container *ngTemplateOutlet="menuLabelTemplate; context: { $implicit: menu }"></ng-container>
      </a>
      <span
        *ngIf="menu.navitem.type !== NAVITEM_TYPE.EXTERNAL_REDIRECT && menu.navitem.type !== NAVITEM_TYPE.INTERNAL_LINK && menu.navitem.type?.toLowerCase() !== 'plugin' && menu.navitem.type !== NAVITEM_TYPE.CUSTOM_PAGE && menu.navitem.type !== NAVITEM_TYPE.DIRECT_CALL"
        class="dropdown-item text-danger">Type de menu inconnu</span>
    </li>
  </ng-container>
</ng-template>
<ng-template #menuLabelTemplate let-menu>
  <img *ngIf="menu.navitem.pre_label === 'avatar'" [src]="avatar$ | async" alt="avatar" class="rounded-circle"
    style="width:28px; height:28px; max-width:28px; max-height:28px; object-fit:cover">
  {{ label_transformer(menu.navitem.label) | async }}
</ng-template>
