<div class="container-md booklet-container" 
  [class.landscape-mode]="isMobile && isLandscape"
  [class.portrait-mode]="isMobile && !isLandscape"
  *ngIf="leftSnippet">
  
  <!-- Header : pagination desktop uniquement -->
  <div class="booklet-header d-flex justify-content-end align-items-center mb-1"
    *ngIf="!isMobile">
    <h5 class="mb-0">Page {{ pageNumber }} - {{ pageNumber + 1 }} / {{ totalPages }}</h5>
  </div>

  <!-- Navigation buttons : mobile portrait uniquement -->
  <div class="page-navigation d-flex gap-2 mb-1"
    *ngIf="isMobile && !isLandscape">
    <button class="btn btn-sm btn-outline-secondary"
      (click)="previous()"
      [disabled]="!hasPrevious"
      title="Pages précédentes">
      ← Retour
    </button>
    <button class="btn btn-sm btn-outline-secondary"
      (click)="next()"
      [disabled]="!hasNext"
      title="Pages suivantes">
      Suivant →
    </button>
  </div>

  <!-- Booklet with two-page spread (desktop & mobile landscape) OR single page (mobile portrait) -->
  <div class="booklet-wrapper" [class.single-page-mode]="isMobile && isLandscape">
    <div class="booklet-book"
      (touchstart)="onTouchStart($event)"
      (touchend)="onTouchEnd($event)">

      <!-- BACKDROP: static background, spans full book, revealed when the flipping page rotates away -->
      <div class="spread-backdrop" *ngIf="isFlipping">

        <!-- Forward flip: shows next spread (N+2 left, N+3 right) -->
        <ng-container *ngIf="flipDirection === 'right'">
          <div class="backdrop-page">
            <ng-container *ngIf="nextLeftSnippet">
              <ng-container *ngTemplateOutlet="snippetCard; context: { $implicit: nextLeftSnippet }"></ng-container>
            </ng-container>
          </div>
          <div class="backdrop-spine"></div>
          <div class="backdrop-page">
            <ng-container *ngIf="nextRightSnippet">
              <ng-container *ngTemplateOutlet="snippetCard; context: { $implicit: nextRightSnippet }"></ng-container>
            </ng-container>
          </div>
        </ng-container>

        <!-- Backward flip: shows previous spread (N-2 left, N-1 right) -->
        <ng-container *ngIf="flipDirection === 'left'">
          <div class="backdrop-page">
            <ng-container *ngIf="prevLeftSnippet">
              <ng-container *ngTemplateOutlet="snippetCard; context: { $implicit: prevLeftSnippet }"></ng-container>
            </ng-container>
          </div>
          <div class="backdrop-spine"></div>
          <div class="backdrop-page">
            <ng-container *ngIf="prevRightSnippet">
              <ng-container *ngTemplateOutlet="snippetCard; context: { $implicit: prevRightSnippet }"></ng-container>
            </ng-container>
          </div>
        </ng-container>

      </div>

      <!-- Left Page: static during forward flip, rotates during backward flip -->
      <div class="page-container left-page"
        (click)="clickPrevious()"
        [class.flipping-left]="isFlipping && flipDirection === 'left'">
        <!-- Front face: current left page -->
        <div class="page-face page-front" *ngIf="leftSnippet">
          <ng-container *ngTemplateOutlet="snippetCard; context: { $implicit: leftSnippet }"></ng-container>
        </div>
        <!-- Back face: prev right page (visible during 2nd half of backward flip) -->
        <div class="page-face page-back" *ngIf="isFlipping && flipDirection === 'left' && prevRightSnippet">
          <ng-container *ngTemplateOutlet="snippetCard; context: { $implicit: prevRightSnippet }"></ng-container>
        </div>
      </div>

      <!-- Book spine -->
      <div class="book-spine"></div>

      <!-- Right Page: rotates during forward flip, static during backward flip -->
      <div class="page-container right-page"
        (click)="clickNext()"
        [class.flipping-right]="isFlipping && flipDirection === 'right'">
        <!-- Front face: current right page -->
        <div class="page-face page-front" *ngIf="rightSnippet">
          <ng-container *ngTemplateOutlet="snippetCard; context: { $implicit: rightSnippet }"></ng-container>
        </div>
        <!-- Back face: next left page (visible during 2nd half of forward flip) -->
        <div class="page-face page-back" *ngIf="isFlipping && flipDirection === 'right' && nextLeftSnippet">
          <ng-container *ngTemplateOutlet="snippetCard; context: { $implicit: nextLeftSnippet }"></ng-container>
        </div>
        <!-- Blank page if last page is odd -->
        <div class="page-face page-front" *ngIf="!rightSnippet">
          <div class="card h-100">
            <div class="card-body d-flex align-items-center justify-content-center">
              <span class="text-muted">Fin du livret</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

</div>

<!-- Card template : structure réutilisée pour chaque slot de snippet -->
<ng-template #snippetCard let-snippet>
  <div class="card h-100 nice_shadow">
    <img [src]="snippet.image_url" class="card-img-top img-fluid"
      alt="{{ snippet.title }}" *ngIf="snippet.image_url">
    <div class="card-body d-flex flex-column">
      <h4 class="card-title">{{ snippet.title }}</h4>
      <p class="text-muted mb-1" *ngIf="snippet.subtitle">{{ snippet.subtitle }}</p>
      <div class="card-text tighter-html flex-grow-1"
        [innerHTML]="stringToSafeHtml(snippet.content)"></div>
    </div>
  </div>
</ng-template>

<!-- Empty state -->
<div class="alert alert-info" *ngIf="snippets.length === 0">
  Aucun snippet à afficher.
</div>
