<!-- Images club spécifiques par mode -->
<div class="container-fluid">

  <div id="headerBanner">
    <!--
      ===============================
      | STRUCTURE DES MODES HEADER |
      ===============================
      Mode laptop :
        - row 1 : logo + banner (nom club + date) centré (col)
        - row 2 : brand + menus horizontaux centrés (col)
        - row 3 : image_club (tplImageClub, classe w-100 d-none d-md-block)
        - row 4 : contenu principal factorisé (tplContent)
        - row 5 : footer factorisé (tplFooter)
      
      Mode mobile (landscape et portrait) :
        - row 1 : burger + banner (nom club + date) centré (col)
        - row 2 : image_club (tplImageClub) uniquement en portrait
        - offcanvas : menu offcanvas
        - row 3 : contenu principal factorisé (tplContent)
        - row 4 : footer factorisé (tplFooter)
    -->
    <ng-container *ngIf="isLaptopMode">
      <ng-template [ngTemplateOutlet]="tplLaptop"></ng-template>
    </ng-container>
    <ng-container *ngIf="!isLaptopMode">
      <ng-template [ngTemplateOutlet]="tplMobile"></ng-template>
    </ng-container>

    <!-- Mode Laptop   -->
    <ng-template #tplLaptop>

      <div class="row d-md-flex align-items-stretch site-banner header-shadow laptop-banner-row g-0 my-0">
        <div class="col d-flex align-items-center px-0 ">
          <ng-template [ngTemplateOutlet]="tplBanner" [ngTemplateOutletContext]="{ mode: 'laptop' }"></ng-template>
        </div>
      </div>

      <app-front-navbar [brandNavitem]="brandNavitem" [navbar_menus]="navbar_menus"
        [logged_member$]="logged_member$" [avatar$]="avatar$" [isPortrait]="isPortrait" [isMobile]="false"
        [label_transformer]="label_transformer.bind(this)" [trackNavitemId]="trackNavitemId.bind(this)"
        [onCommand]="onCommand.bind(this)" [imageClubUrl]="imageClubUrl" [logoUrl]="logoUrl">
      </app-front-navbar>
      <div class="laptop-content-container">
        <div class="laptop-image-club ">
          <ng-template [ngTemplateOutlet]="tplImageClub"></ng-template>
        </div>
        <ng-template [ngTemplateOutlet]="tplContent"></ng-template>
      </div>
      <ng-template [ngTemplateOutlet]="tplFooter"></ng-template>
    </ng-template>

    <!-- Mode Mobile (landscape et portrait) -->
    <ng-template #tplMobile>
      <div class="row d-flex align-items-stretch site-banner header-shadow">

        <div class="navbar-bg h-auto g-0 w-100 py-0 my-0">
          <nav class="navbar navbar-dark">
            <div class="d-flex align-items-center px-0 w-100">
              <button class="navbar-toggler ms-2 me-2 flex-shrink-0" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#mobileMenuOffcanvas" aria-controls="mobileMenuOffcanvas" aria-label="Ouvrir le menu">
                <span class="navbar-toggler-icon"></span>
              </button>
              <div class="flex-grow-1 d-flex justify-content-center align-items-center min-width-0">
                <ng-template [ngTemplateOutlet]="tplBanner"
                  [ngTemplateOutletContext]="{ mode: 'mobile' }"></ng-template>
              </div>
            </div>
          </nav>
          <ng-template [ngTemplateOutlet]="tplOffcanvasMenu"
            [ngTemplateOutletContext]="{ offcanvasId: 'mobileMenuOffcanvas', offcanvasLabel: 'mobileMenuOffcanvasLabel' }"></ng-template>

          <ng-template *ngIf="isMobilePortrait" [ngTemplateOutlet]="tplImageClub"></ng-template>
        </div>
      </div>
      <ng-template [ngTemplateOutlet]="tplContent"></ng-template>
      <ng-template [ngTemplateOutlet]="tplFooter"></ng-template>
    </ng-template>

  </div>

  <!-- menu offcanvas -->
  <ng-template #tplOffcanvasMenu let-offcanvasId="offcanvasId" let-offcanvasLabel="offcanvasLabel">
    <div class="offcanvas offcanvas-start offcanvas-adapt-width" tabindex="-1" [id]="offcanvasId"
      [attr.aria-labelledby]="offcanvasLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" [id]="offcanvasLabel">Menu</h5>
        <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Fermer"></button>
      </div>
      <div class="offcanvas-body p-0">
        <ul class="navbar-nav mb-2 w-100">
          <li *ngIf="brandNavitem" class="nav-item w-100">
            <a class="nav-link main-nav-link ps-2 py-2 fw-bold" [routerLink]="brandNavitem.path"
              data-bs-dismiss="offcanvas">
              {{ brandNavitem.label }}
            </a>
          </li>
        </ul>
        <div class="w-100">
          <app-front-navbar [club_name]="club_name" [brandNavitem]="null" [navbar_menus]="navbar_menus"
            [logged_member$]="logged_member$" [avatar$]="avatar$" [isPortrait]="isPortrait" [isMobile]="true"
            [label_transformer]="label_transformer.bind(this)" [trackNavitemId]="trackNavitemId.bind(this)"
            [onCommand]="onCommand.bind(this)" [imageClubUrl]="imageClubUrl" [logoUrl]="logoUrl">
          </app-front-navbar>
        </div>
      </div>
    </div>
  </ng-template>


  <!-- Éléments factorisés communs aux modes -->
  <ng-template #tplLogo>
    <a routerLink="contacts" style="display: flex; align-items: center;">
      <img class="img-fluid nice_shadow m-1 ms-4" style="max-height: 40px; width: auto;" [src]="logoUrl" alt="logo" />
    </a>
  </ng-template>


  <ng-template #tplBanner let-mode="mode">
    <ng-container [ngSwitch]="mode">
      <!-- Mode laptop : logo + nom club centré + date calée à droite -->
      <span *ngSwitchCase="'laptop'" class="d-flex align-items-center w-100">
        <ng-template [ngTemplateOutlet]="tplLogo"></ng-template>
        <span class="flex-grow-1 text-center text-nowrap">{{ club_name }}        </span>
        <span class="small text-nowrap ms-auto me-2">{{today | date:'EEEE d MMMM yyyy':'':'fr-FR' }}</span>
      </span>
      <!-- Mode mobile (landscape et portrait) : nom club centré + date en dessous -->
      <span *ngSwitchDefault class="w-100 d-flex flex-column align-items-center justify-content-center">
        <span class="fw-bold text-nowrap">{{ club_name }}</span>
        <span class="small text-nowrap">{{today | date:'EEEE d MMMM yyyy':'':'fr-FR' }}</span>
      </span>
    </ng-container>
    <span *ngIf="sandbox" class="badge sandbox-badge text-dark" aria-label="Mode sandbox">Mode
      Sandbox</span>
  </ng-template>


  <ng-template #tplImageClub>
        <img class="w-100 nice_shadow"
          [class.d-none]="isMobileLandscape"
          [class.d-md-block]="!isMobilePortrait && !isMobileLandscape"
          [src]="imageClubUrl"
          alt="image_club"
          style="height: 100px; width: 100vw; object-fit: cover; display: block;" />
  </ng-template>

  <ng-template #tplContent>
    <div class="row content-row">
      <div class="offset-xl-1 col-xl-10 justify-content-center main-content">
        <div class="mt-2 mb-2">
          <app-title></app-title>
        </div>

        <router-outlet ></router-outlet>
      </div>
    </div>
  </ng-template>

  <ng-template #tplFooter>
    <div class="footer-banner d-flex align-items-center justify-content-between flex-wrap ">
      <div class="footer-banner-content flex-grow-1">
        <div class="text-center">© 2026 {{ club_name }}</div>
        <div class="row justify-content-center">
          <div *ngFor="let menu of footer_menus; trackBy: trackNavitemId" class="col-auto">
            <a [routerLink]="menu.navitem.path" class="mb-0 footer-banner" style="text-decoration: none;">{{
              menu.navitem.label }}</a>
          </div>
        </div>
      </div>
      <div class="footer-banner-img d-flex align-items-center" *ngIf="isLaptopMode">
        <img src="VilleDeStOrens.png" alt="Saint-Orens" class="img-fluid nice_shadow" />
      </div>
    </div>
  </ng-template>
